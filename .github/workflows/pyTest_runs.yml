name: GitHub Pytest Runs
run-name: ${{ github.actor }}

on:
  push:
    branches:
      - main
      - issue-4/configuring-ci-cd-pytest
      - develop
    
    # Ignore changes to the README and the workflow file
    paths-ignore:
      - 'README.md'
      # - '.github/workflows/pyTest_runs.yml'

  pull_request:
    branches:
      - main
      - issue-4/configuring-ci-cd-pytest
      - develop
    
    # Ignore changes to the README and the workflow file
    paths-ignore:
      - 'README.md'
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at midnight

# This workflow will run pytest on the codebase and upload the results as an artifact
jobs:
  pytest:
    # This runs it at the lasest version of Ubuntu
    runs-on: ubuntu-latest
    steps:
      # This inputs a message to the console
      - run: echo "Running Pytest"
      
      # This checks out the code from the repository so that it can be tested 'actions/checkout@v3'
      - uses: actions/checkout@v3
        
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ \
            --junitxml=results.xml \
            --cov=core --cov=models --cov=routers --cov=enums \  # Specify your app modules
            --cov-report=xml --cov-report=html --cov-report=term-missing \
            --cov-fail-under=80  # Fail if coverage drops below 80%

      - name: Run tests
        run: |
          python -m pytest tests/ --junitxml=results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()  # This ensures that the artifact is uploaded even if the tests fail
        with:
          name: pytest-results
          path: results.xml 